
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lenses" />
  <title>Lens Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Generate eye icon for home screen + favicon via canvas -->
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      try {
        var S = 512, c = document.createElement('canvas');
        c.width = c.height = S;
        var ctx = c.getContext('2d');

        /* white→light-gray background */
        var g = ctx.createLinearGradient(0, 0, S, S);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(1, '#e8e8ec');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, S, S);

        var cx = S / 2, cy = S / 2;
        ctx.strokeStyle = '#22c55e';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        /* outer eye shape */
        ctx.lineWidth = 24;
        ctx.beginPath();
        ctx.moveTo(cx - 168, cy);
        ctx.bezierCurveTo(cx - 84, cy - 132, cx + 84, cy - 132, cx + 168, cy);
        ctx.bezierCurveTo(cx + 84, cy + 132, cx - 84, cy + 132, cx - 168, cy);
        ctx.stroke();

        /* iris ring */
        ctx.lineWidth = 22;
        ctx.beginPath();
        ctx.arc(cx, cy, 56, 0, Math.PI * 2);
        ctx.stroke();

        /* pupil */
        ctx.beginPath();
        ctx.arc(cx, cy, 26, 0, Math.PI * 2);
        ctx.fillStyle = '#22c55e';
        ctx.fill();

        var url = c.toDataURL('image/png');

        /* apple-touch-icon (iOS home screen) */
        var ati = document.createElement('link');
        ati.rel = 'apple-touch-icon';
        ati.href = url;
        document.head.appendChild(ati);

        /* regular favicon */
        var fav = document.createElement('link');
        fav.rel = 'icon'; fav.type = 'image/png';
        fav.href = url;
        document.head.appendChild(fav);

        /* inline web-app manifest for Android PWA */
        var manifest = {
          name: 'Lens Tracker', short_name: 'Lenses',
          display: 'standalone', start_url: '.',
          background_color: '#ffffff', theme_color: '#ffffff',
          icons: [{ src: url, sizes: '512x512', type: 'image/png' }]
        };
        var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        var mlink = document.createElement('link');
        mlink.rel = 'manifest';
        mlink.href = URL.createObjectURL(blob);
        document.head.appendChild(mlink);
      } catch (e) {}
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { display: flex; justify-content: center; background: #e4e4e7; }
    ::-webkit-scrollbar { display: none; }
    .worn-btn:active { transform: scale(0.97); }
    .step-btn:active  { transform: scale(0.95); }
    .sheet-overlay { animation: fadeIn 0.18s ease; }
    .sheet-card    { animation: slideUp 0.22s cubic-bezier(0.32,0.72,0,1); }
    @keyframes fadeIn  { from { opacity: 0 }              to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ── localStorage keys ── */
    const LS_LOGS = 'lt_logs';
    const LS_DATE = 'lt_today_date';

    /* ── SVG icon helpers ── */
    const Icon = ({ size = 20, color = "currentColor", sw = 1.5, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );
    const EyeIcon   = p => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const ResetIcon = p => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const CheckIcon = p => <Icon {...p} sw={p.sw||2.5}><path d="M20 6 9 17l-5-5"/></Icon>;
    const DropsIcon = p => <Icon {...p}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></Icon>;
    const WarnIcon  = p => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>;
    const CalIcon   = p => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
    const PlusIcon    = p => <Icon {...p} sw={p.sw||2}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const MinusIcon   = p => <Icon {...p} sw={p.sw||2.5}><path d="M5 12h14"/></Icon>;
    const CloseIcon   = p => <Icon {...p} sw={p.sw||2}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const RefreshIcon = p => <Icon {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></Icon>;
    const MicIcon     = p => <Icon {...p}><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></Icon>;
    const CopyIcon    = p => <Icon {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;

    /* ── App ── */
    function LensTracker() {
      const [logs, setLogs] = useState(() => {
        try { return JSON.parse(localStorage.getItem(LS_LOGS)) || []; }
        catch { return []; }
      });

      // todayLogged resets automatically on a new calendar day
      const [todayLogged, setToday] = useState(() => {
        try { return localStorage.getItem(LS_DATE) === new Date().toDateString(); }
        catch { return false; }
      });
      const [catchupOpen, setCatchup] = useState(false);
      const [catchupCount, setCount]  = useState(1);

      const daysWorn = logs.length;
      const isWarn   = daysWorn >= 21;
      const daysLeft = Math.max(0, 21 - daysWorn);
      const progress = Math.min((daysWorn / 21) * 100, 100);

      // Persist logs to localStorage whenever they change
      useEffect(() => {
        try { localStorage.setItem(LS_LOGS, JSON.stringify(logs)); }
        catch {}
      }, [logs]);

      const G = { btn:"#22c55e", text:"#15803d", light:"#f0fdf4", border:"#86efac", glow:"#22c55e40" };
      const R = { btn:"#ef4444", text:"#b91c1c", light:"#fef2f2", border:"#fca5a5", glow:"#ef444440" };
      const C = isWarn ? R : G;

      const logWorn = () => {
        if (todayLogged) return;
        const now = new Date();
        setLogs(p => [...p, {
          date:    now.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }),
          time:    now.toLocaleTimeString("en-US",  { hour:"2-digit", minute:"2-digit" }),
          dayNum:  p.length + 1,
          id:      Date.now(),
          catchup: false,
        }]);
        // Remember today's date so the button resets tomorrow
        try { localStorage.setItem(LS_DATE, now.toDateString()); } catch {}
        setToday(true);
      };

      const confirmCatchup = () => {
        const entries = Array.from({ length: catchupCount }, (_, i) => {
          const d = new Date();
          d.setDate(d.getDate() - (catchupCount - i));
          return {
            date:    d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }),
            time:    "backdated",
            dayNum:  logs.length + i + 1,
            id:      Date.now() + i,
            catchup: true,
          };
        });
        setLogs(p => [...p, ...entries]);
        setCatchup(false);
        setCount(1);
      };

      const reset = () => {
        setLogs([]); setToday(false); setCatchup(false);
        try { localStorage.removeItem(LS_LOGS); localStorage.removeItem(LS_DATE); } catch {}
      };

      // Hard-reload from server — busts the cache so GitHub Pages serves the latest file
      const [spinning, setSpinning] = useState(false);
      const refreshApp = () => {
        setSpinning(true);
        location.replace(location.pathname + '?v=' + Date.now());
      };

      // Toast
      const [toast, setToast]     = useState('');
      const [toastOk, setToastOk] = useState(true);
      const showToast = (msg, ok = true) => {
        setToast(msg); setToastOk(ok);
        setTimeout(() => setToast(''), 3200);
      };

      // Siri setup sheet
      const [siriOpen, setSiri]   = useState(false);
      const [copied, setCopied]   = useState(false);
      const siriUrl = () => location.origin + location.pathname + '?action=log';
      const copySiriUrl = () => {
        const url = siriUrl();
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
        } else {
          const el = document.createElement('textarea');
          el.value = url; document.body.appendChild(el);
          el.select(); document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true); setTimeout(() => setCopied(false), 2000);
        }
      };

      // ── Detect ?action=log (triggered by Siri Shortcut) ──
      useEffect(() => {
        const params = new URLSearchParams(location.search);
        if (params.get('action') !== 'log') return;
        history.replaceState({}, '', location.pathname); // clean URL
        const alreadyToday = localStorage.getItem(LS_DATE) === new Date().toDateString();
        if (alreadyToday) { showToast('already logged today ✓', true); return; }
        const saved = (() => { try { return JSON.parse(localStorage.getItem(LS_LOGS)) || []; } catch { return []; } })();
        const now = new Date();
        const entry = {
          date:    now.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }),
          time:    now.toLocaleTimeString("en-US",  { hour:"2-digit", minute:"2-digit" }),
          dayNum:  saved.length + 1,
          id:      Date.now(),
          catchup: false,
        };
        setLogs([...saved, entry]);
        try { localStorage.setItem(LS_DATE, now.toDateString()); } catch {}
        setToday(true);
        showToast(`day ${entry.dayNum} logged via siri ✓`, true);
      }, []);

      const mono = { fontFamily: "'Geist Mono', 'Courier New', monospace" };

      /* ── colour tokens (cool gray palette) ── */
      const T = {
        text:    "#18181b",   /* zinc-900 */
        sub:     "#52525b",   /* zinc-600 */
        muted:   "#71717a",   /* zinc-500 */
        faint:   "#a1a1aa",   /* zinc-400 */
        border:  "#d4d4d8",   /* zinc-300 */
        divider: "#e4e4e7",   /* zinc-200 */
        surface: "#f4f4f5",   /* zinc-100 */
      };

      return (
        <div style={{ ...mono,
          background: "linear-gradient(160deg, #ffffff 0%, #f4f4f5 55%, #e4e4e7 100%)",
          minHeight: "100dvh", width: "100%", maxWidth: 430,
          color: T.text, display: "flex", flexDirection: "column",
          overflow: "hidden", position: "relative"
        }}>

          {/* ── Status bar ── */}
          <div style={{ padding:"14px 24px 0", display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:11, color:T.faint, letterSpacing:"0.05em" }}>
            <span>{new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</span>
            <div style={{ width:15, height:7, border:`1px solid ${T.border}`, borderRadius:2, display:"flex", alignItems:"center", padding:1 }}>
              <div style={{ width:"60%", height:"100%", background:T.border, borderRadius:1 }} />
            </div>
          </div>

          {/* ── Header ── */}
          <div style={{ padding:"18px 24px 0", display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:46, height:46, borderRadius:14, background:"rgba(255,255,255,0.85)", border:`1.5px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 2px 14px ${C.glow}`, flexShrink:0 }}>
              <EyeIcon size={22} color={C.text} sw={1.5} />
            </div>
            <div style={{ flex:1 }} />
            {/* Siri setup */}
            <button onClick={() => setSiri(true)} title="Set up Siri" style={{ ...mono, background:"transparent", border:`1px solid ${T.border}`, borderRadius:10, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", flexShrink:0 }}>
              <MicIcon size={14} color={T.muted} sw={1.8} />
            </button>
            {/* Reload from GitHub */}
            <button onClick={refreshApp} title="Reload latest version" style={{ ...mono, background:"transparent", border:`1px solid ${T.border}`, borderRadius:10, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", flexShrink:0, transition:"opacity 0.2s", opacity: spinning ? 0.4 : 1 }}>
              <RefreshIcon size={14} color={T.muted} sw={1.8} />
            </button>
            <button onClick={reset} style={{ ...mono, background:"transparent", border:`1px solid ${T.border}`, borderRadius:10, padding:"8px 14px", color:T.muted, fontSize:10, cursor:"pointer", display:"flex", alignItems:"center", gap:6, letterSpacing:"0.08em", textTransform:"uppercase", flexShrink:0 }}>
              <ResetIcon size={10} color={T.muted} sw={1.5} /> new pair
            </button>
          </div>

          {/* ── Worn button ── */}
          <div style={{ padding:"22px 24px 0" }}>
            <button className="worn-btn" onClick={logWorn} disabled={todayLogged} style={{ ...mono, width:"100%", padding:"17px 24px", background: todayLogged ? T.surface : C.btn, color: todayLogged ? T.faint : "#fff", border:"none", borderRadius:18, fontSize:14, fontWeight:700, letterSpacing:"0.18em", textTransform:"uppercase", cursor: todayLogged ? "default" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, transition:"all 0.3s ease", boxShadow: todayLogged ? "none" : `0 6px 24px ${C.glow}` }}>
              {todayLogged
                ? <><CheckIcon size={15} color={T.faint} />logged for today</>
                : <><DropsIcon size={15} color="#fff" />worn</>}
            </button>

            <button onClick={() => setCatchup(true)} style={{ ...mono, width:"100%", marginTop:8, padding:"12px 24px", background:"transparent", color:T.muted, border:`1.5px dashed ${T.border}`, borderRadius:14, fontSize:11, fontWeight:500, letterSpacing:"0.12em", textTransform:"uppercase", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <PlusIcon size={11} color={T.muted} /> add missed days
            </button>
          </div>

          {/* ── Counter card ── */}
          <div style={{ padding:"16px 24px 0" }}>
            <div style={{ background:"rgba(255,255,255,0.72)", backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)", borderRadius:22, border:`1.5px solid ${C.border}`, padding:22, display:"grid", gridTemplateColumns:"1fr 88px", gap:16, alignItems:"center", boxShadow:"0 2px 20px rgba(0,0,0,0.04)" }}>
              <div>
                <div style={{ fontSize:72, fontWeight:800, color:C.btn, lineHeight:1, letterSpacing:"-5px", transition:"color 0.5s ease" }}>
                  {String(daysWorn).padStart(2,"0")}
                </div>
                <div style={{ fontSize:10, color:T.faint, letterSpacing:"0.15em", textTransform:"uppercase", marginTop:8 }}>days worn</div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10, alignItems:"flex-end" }}>
                <div style={{ background:C.light, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 10px", display:"flex", alignItems:"center", gap:5 }}>
                  {isWarn ? <WarnIcon size={10} color={C.text} /> : <CheckIcon size={10} color={C.text} sw={2.5} />}
                  <span style={{ fontSize:9, color:C.text, letterSpacing:"0.08em", fontWeight:600 }}>
                    {isWarn ? "replace" : "ok"}
                  </span>
                </div>
                <div style={{ width:"100%", textAlign:"right" }}>
                  <div style={{ fontSize:9, color:T.faint, letterSpacing:"0.06em", marginBottom:5 }}>
                    {isWarn ? "overdue" : `${daysLeft}d left`}
                  </div>
                  <div style={{ width:72, height:3, background:T.divider, borderRadius:2, marginLeft:"auto" }}>
                    <div style={{ width:`${progress}%`, height:"100%", background: isWarn ? "linear-gradient(90deg,#f87171,#ef4444)" : "linear-gradient(90deg,#6ee7b7,#22c55e)", borderRadius:2, transition:"width 0.5s ease, background 0.5s ease" }} />
                  </div>
                  <div style={{ fontSize:8, color:T.faint, marginTop:4, letterSpacing:"0.05em" }}>{Math.round(progress)}% of 21d</div>
                </div>
              </div>
            </div>
          </div>

          {/* ── Log list ── */}
          <div style={{ flex:1, padding:"20px 24px 40px", overflowY:"auto", display:"flex", flexDirection:"column" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto", alignItems:"center", marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${T.divider}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                <CalIcon size={11} color={T.faint} sw={1.5} />
                <span style={{ fontSize:10, color:T.faint, letterSpacing:"0.15em", textTransform:"uppercase" }}>wear history</span>
              </div>
              <span style={{ fontSize:10, color:T.faint }}>{logs.length} {logs.length === 1 ? "entry" : "entries"}</span>
            </div>

            {logs.length === 0 ? (
              <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10, padding:"40px 0", color:T.faint }}>
                <EyeIcon size={28} color={T.divider} sw={1} />
                <div style={{ fontSize:11, letterSpacing:"0.1em", color:T.faint }}>no logs yet</div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                {[...logs].reverse().map((log, idx) => {
                  const red     = log.dayNum >= 21;
                  const dot     = red ? "#ef4444" : "#22c55e";
                  const dotBg   = red ? "#fef2f2" : "#f0fdf4";
                  const dotBord = red ? "#fca5a5" : "#86efac";
                  const isFirst = idx === 0;
                  return (
                    <div key={log.id} style={{ display:"grid", gridTemplateColumns:"32px 1fr auto", gap:12, alignItems:"center", padding:"11px 14px", background: isFirst ? "rgba(255,255,255,0.65)" : "rgba(255,255,255,0.35)", borderRadius:13, border:`1px solid ${isFirst ? T.border : T.divider}` }}>
                      <div style={{ width:32, height:32, borderRadius:9, background:dotBg, border:`1px solid ${dotBord}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:dot, letterSpacing:"-0.5px", flexShrink:0 }}>
                        {String(log.dayNum).padStart(2,"0")}
                      </div>
                      <div>
                        <div style={{ fontSize:12, color:T.sub }}>{log.date}</div>
                        <div style={{ fontSize:10, color:T.faint, marginTop:2 }}>
                          {log.catchup ? "↩ backdated" : log.time}
                        </div>
                      </div>
                      <div style={{ width:6, height:6, borderRadius:"50%", background:dot, flexShrink:0 }} />
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── Toast ── */}
          {toast && (
            <div style={{ position:"fixed", bottom:88, left:"50%", transform:"translateX(-50%)", background: toastOk ? "#18181b" : "#b91c1c", color:"#fff", padding:"11px 20px", borderRadius:12, fontSize:11, ...mono, letterSpacing:"0.06em", zIndex:200, whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(0,0,0,0.18)", animation:"fadeIn 0.2s ease" }}>
              {toast}
            </div>
          )}

          {/* ── Siri setup sheet ── */}
          {siriOpen && (
            <div className="sheet-overlay" onClick={() => setSiri(false)} style={{ position:"fixed", inset:0, background:"rgba(24,24,27,0.22)", zIndex:50, display:"flex", alignItems:"flex-end", maxWidth:430, margin:"0 auto" }}>
              <div className="sheet-card" onClick={e => e.stopPropagation()} style={{ ...mono, width:"100%", background:"linear-gradient(175deg,#ffffff,#f4f4f5)", borderRadius:"24px 24px 0 0", padding:"28px 24px 52px", boxShadow:"0 -8px 40px rgba(0,0,0,0.08)", maxHeight:"88dvh", overflowY:"auto" }}>
                <div style={{ width:36, height:4, background:T.border, borderRadius:2, margin:"0 auto 22px" }} />

                {/* Sheet header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                  <div>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <MicIcon size={15} color="#6366f1" sw={1.8} />
                      <div style={{ fontSize:15, fontWeight:700, color:T.text, letterSpacing:"-0.02em" }}>siri shortcut</div>
                    </div>
                    <div style={{ fontSize:10, color:T.faint, letterSpacing:"0.08em" }}>log lenses with your voice</div>
                  </div>
                  <button onClick={() => setSiri(false)} style={{ background:T.surface, border:"none", borderRadius:8, width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                    <CloseIcon size={13} color={T.muted} />
                  </button>
                </div>

                {/* Steps */}
                {[
                  { n:"1", text: "Open the Shortcuts app on your iPhone" },
                  { n:"2", text: 'Tap  +  → tap "Add Action" → search "Open URLs"' },
                  { n:"3", text: "Paste the URL below into the URL field" },
                  { n:"4", text: 'Tap the shortcut name at the top → "Add to Siri"' },
                  { n:"5", text: 'Record your phrase — e.g. "log contact lens"' },
                ].map(s => (
                  <div key={s.n} style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:14 }}>
                    <div style={{ width:24, height:24, borderRadius:7, background:"#ededf5", border:"1px solid #d4d4f0", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:"#6366f1", flexShrink:0, marginTop:1 }}>
                      {s.n}
                    </div>
                    <div style={{ fontSize:12, color:T.sub, lineHeight:1.5, paddingTop:3 }}>{s.text}</div>
                  </div>
                ))}

                {/* URL copy box */}
                <div style={{ background:"rgba(255,255,255,0.6)", border:`1.5px solid ${T.border}`, borderRadius:14, padding:"12px 14px", marginTop:6, marginBottom:20 }}>
                  <div style={{ fontSize:9, color:T.faint, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>shortcut url</div>
                  <div style={{ fontSize:10, color:T.sub, wordBreak:"break-all", lineHeight:1.6, marginBottom:12 }}>
                    {typeof location !== "undefined" ? siriUrl() : ""}
                  </div>
                  <button onClick={copySiriUrl} style={{ ...mono, width:"100%", padding:"11px", background: copied ? "#f0fdf4" : T.surface, color: copied ? "#15803d" : T.muted, border: copied ? "1px solid #86efac" : `1px solid ${T.border}`, borderRadius:10, fontSize:11, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, transition:"all 0.2s" }}>
                    {copied ? <><CheckIcon size={12} color="#15803d" sw={2.5} />copied!</> : <><CopyIcon size={12} color={T.muted} />copy url</>}
                  </button>
                </div>

                <div style={{ fontSize:10, color:T.faint, lineHeight:1.6, letterSpacing:"0.02em", borderTop:`1px solid ${T.divider}`, paddingTop:14 }}>
                  You can rename the phrase anytime by editing the shortcut in the Shortcuts app. The app logs silently when opened via the shortcut — no tapping needed.
                </div>
              </div>
            </div>
          )}

          {/* ── Catch-up bottom sheet ── */}
          {catchupOpen && (
            <div className="sheet-overlay" onClick={() => setCatchup(false)} style={{ position:"fixed", inset:0, background:"rgba(24,24,27,0.22)", zIndex:50, display:"flex", alignItems:"flex-end", maxWidth:430, margin:"0 auto" }}>
              <div className="sheet-card" onClick={e => e.stopPropagation()} style={{ ...mono, width:"100%", background:"linear-gradient(175deg,#ffffff,#f4f4f5)", borderRadius:"24px 24px 0 0", padding:"28px 24px 52px", boxShadow:"0 -8px 40px rgba(0,0,0,0.08)" }}>
                <div style={{ width:36, height:4, background:T.border, borderRadius:2, margin:"0 auto 22px" }} />
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700, color:T.text, letterSpacing:"-0.02em" }}>missed days</div>
                    <div style={{ fontSize:10, color:T.faint, letterSpacing:"0.08em", marginTop:4 }}>how many days to add?</div>
                  </div>
                  <button onClick={() => setCatchup(false)} style={{ background:T.surface, border:"none", borderRadius:8, width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                    <CloseIcon size={13} color={T.muted} />
                  </button>
                </div>

                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(255,255,255,0.6)", borderRadius:16, padding:"16px 20px", margin:"20px 0", border:`1.5px solid ${T.border}` }}>
                  <button className="step-btn" onClick={() => setCount(c => Math.max(1, c-1))} style={{ width:38, height:38, borderRadius:11, background:T.divider, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <MinusIcon size={16} color={T.sub} />
                  </button>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:48, fontWeight:800, color:T.text, letterSpacing:"-3px", lineHeight:1 }}>{catchupCount}</div>
                    <div style={{ fontSize:10, color:T.faint, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:4 }}>{catchupCount === 1 ? "day" : "days"}</div>
                  </div>
                  <button className="step-btn" onClick={() => setCount(c => Math.min(14, c+1))} style={{ width:38, height:38, borderRadius:11, background:T.divider, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <PlusIcon size={16} color={T.sub} />
                  </button>
                </div>

                <button onClick={confirmCatchup} style={{ ...mono, width:"100%", padding:16, background:C.btn, color:"#fff", border:"none", borderRadius:16, fontSize:13, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:`0 6px 20px ${C.glow}` }}>
                  <CheckIcon size={14} color="#fff" sw={2.5} /> confirm {catchupCount} {catchupCount === 1 ? "day" : "days"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LensTracker />);
  </script>
</body>
</html>
